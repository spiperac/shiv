name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  build-linux:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev wget libfuse2
      - name: Install Fyne
        run: go install fyne.io/tools/cmd/fyne@latest
      - name: Build
        run: go build -o shiv .
      - name: Download linuxdeploy
        run: wget -qO linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage && chmod +x linuxdeploy
      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp shiv AppDir/usr/bin/
          cp assets/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/shiv.png
          printf '[Desktop Entry]\nName=Shiv\nExec=shiv\nIcon=shiv\nType=Application\nCategories=Utility;\n' > AppDir/usr/share/applications/shiv.desktop
          ARCH=x86_64 ./linuxdeploy --appimage-extract-and-run --appdir AppDir --output appimage
      - name: Upload AppImage
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: Shiv-x86_64.AppImage

  build-macos:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install Fyne
        run: go install fyne.io/tools/cmd/fyne@latest
      - name: Build arm64
        run: GOARCH=arm64 fyne package -os darwin
      - name: Move arm64 binary
        run: mv Shiv.app/Contents/MacOS/Shiv Shiv.app/Contents/MacOS/Shiv-arm64
      - name: Build amd64
        run: GOARCH=amd64 fyne package -os darwin
      - name: Move amd64 binary
        run: mv Shiv.app/Contents/MacOS/Shiv Shiv.app/Contents/MacOS/Shiv-amd64
      - name: Create universal binary
        run: |
          lipo -create \
            Shiv.app/Contents/MacOS/Shiv-arm64 \
            Shiv.app/Contents/MacOS/Shiv-amd64 \
            -output Shiv.app/Contents/MacOS/Shiv
          rm Shiv.app/Contents/MacOS/Shiv-arm64 Shiv.app/Contents/MacOS/Shiv-amd64
      - name: Zip app
        run: zip -r Shiv-macos.zip Shiv.app
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: Shiv-macos.zip

  build-windows:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 libgl1-mesa-dev xorg-dev
      - name: Install Fyne
        run: go install fyne.io/tools/cmd/fyne@latest
      - name: Build
        run: CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 CGO_ENABLED=1 fyne package -os windows
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: Shiv.exe
